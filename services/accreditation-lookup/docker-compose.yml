services:
  api:
    build: .
    ports:
      - "3001:3001"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: accred
      POSTGRES_PASSWORD: accred
      POSTGRES_DB: accreditation
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U accred -d accreditation"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
