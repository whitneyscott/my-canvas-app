services:
  - type: web
    name: canvas-bulk-editor
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: ACCREDITATION_LOOKUP_URL
        fromService:
          name: accreditation-lookup
          type: web
          property: hostport

  - type: web
    name: accreditation-lookup
    runtime: docker
    rootDir: services/accreditation-lookup
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: accreditation-db
          property: connectionString
      - key: NODE_ENV
        value: production

databases:
  - name: accreditation-db
